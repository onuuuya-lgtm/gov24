<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>정부24</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="phone-container">
        <div class="status-bar">
            <span>오전 12:00</span>
            <span class="status-icons">📶 🔋 100%</span>
        </div>
        
        <div class="app-header">
            <h1>정부24</h1>
        </div>

        <div class="content">
            <div class="id-card">
                <div class="card-header">
                    <div class="logo-text">정부24</div>
                    <span class="card-title">모바일 신분증</span>
                </div>
                
                <div class="photo-area">
                    <img src="photo.jpg" alt="본인 사진" class="face-photo">
                </div>
                
                <div class="card-body">
                    <p class="name">이민준</p>
                    <p class="id-number">070728-3846017</p>          
                    <p class="address">경상남도 사천시 주공1길 50</p>
                    <p class="issue-date">발급일자: 2025.08.01</p>
                </div>

                <div class="card-footer">
                    <div class="qr-placeholder">QR 코드 영역</div>
                </div>
            </div>
        </div>

        <div class="warning-bar">
            <p>⚠️ 본인인증 화면입니다. 타인에게 보여주지 마세요.</p>
        </div>
    </div>
</body>
</html>
